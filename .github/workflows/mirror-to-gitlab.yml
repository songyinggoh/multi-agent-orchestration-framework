name: Mirror to GitLab

on:
  push:
    branches: ["*"]
    tags: ["*"]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          CLEAN_PAT=$(echo -n "$GITLAB_PAT" | tr -d '\n\r ')
          AUTH=$(echo -n "oauth2:${CLEAN_PAT}" | base64 -w0)
          HEADER="Authorization: Basic ${AUTH}"
          git remote add gitlab "https://gitlab.com/songyinggoh/multi-agent-orchestration-framework.git"
          git -c "http.https://gitlab.com/.extraheader=${HEADER}" push gitlab --all --force
          git -c "http.https://gitlab.com/.extraheader=${HEADER}" push gitlab --tags --force
        env:
          GITLAB_PAT: ${{ secrets.GITLAB }}
