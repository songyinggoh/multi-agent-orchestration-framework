name: Mirror to GitLab

on:
  push:
    branches: ["*"]
    tags: ["*"]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          CLEAN_PAT=$(echo -n "$GITLAB_PAT" | tr -d '\n\r ')
          git remote add gitlab "https://oauth2:${CLEAN_PAT}@gitlab.com/songyinggoh/multi-agent-orchestration-framework.git"
          git push gitlab --all --force
          git push gitlab --tags --force
        env:
          GITLAB_PAT: ${{ secrets.GITLAB }}
