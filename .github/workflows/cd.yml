name: CD (Helm & KinD)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # required by ct to detect changed charts

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (lint)
        run: ct lint --target-branch main --chart-dirs deploy/helm/

  helm-install:
    name: Helm Install (KinD)
    # Only deploy on push to main — not on every PR
    if: github.event_name == 'push'
    needs: [helm-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # required by ct to detect changed charts

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: orchestra-kind

      - name: Build Docker image for worker
        run: |
          docker build -t orchestra-agents/worker:latest .

      - name: Load image into KinD
        run: |
          kind load docker-image orchestra-agents/worker:latest --name orchestra-kind

      - name: Run chart-testing (install)
        run: ct install --target-branch main --chart-dirs deploy/helm/ --namespace orchestra-test
