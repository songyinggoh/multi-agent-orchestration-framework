name: Phase 3 Quality Gates

on:
  push:
    branches: [phase3-production-readiness, master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,server,storage]"
      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ tests/integration/ tests/security/ \
            --cov=orchestra \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -q

  chaos-tests:
    name: Chaos Engineering Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,server,storage]"
      - name: Run chaos tests
        run: python -m pytest tests/chaos/ -v

  property-tests:
    name: Property-Based Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev,server,storage,test-advanced]"
      - name: Run property tests
        run: python -m pytest tests/property/ -v
